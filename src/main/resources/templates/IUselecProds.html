<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos por Categoría</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center mb-4">Productos Disponibles</h1>

        <div class="row">

            <!-- Iteramos sobre la lista de productos enviada por el Controlador -->
            <div class="col-md-4 mb-4" th:each="producto : ${productos}">
                <div class="card h-100 shadow-sm">
                    <!-- Imagen de marcador de posición -->
                    <img src="https://via.placeholder.com/300x200.png?text=Producto" class="card-img-top"
                        alt="Imagen del producto">

                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title text-primary" th:text="${producto.nombre}">Nombre Producto</h5>
                        <p class="card-text text-muted small" th:text="${producto.descripcion}">Descripción corta del
                            producto.</p>

                        <div class="mt-auto">
                            <h4 class="text-success mb-3">$<span th:text="${producto.precio}">0.00</span></h4>
                            <!-- Acción simulada para la etapa 1.5 del caso de uso -->
                            <button class="btn btn-primary w-100">Añadir al carrito</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Mostrar mensaje si no hay productos en esta categoría -->
            <div class="col-12 text-center" th:if="${#lists.isEmpty(productos)}">
                <div class="alert alert-warning" role="alert">
                    No se encontraron productos para esta categoría.
                </div>
            </div>

        </div>

        <div class="text-center mt-4 mb-5">
            <a th:href="@{/MenuCategorias.html}" class="btn btn-secondary">Regresar a Categorías</a>
        </div>
    </div>

</body>

</html>
