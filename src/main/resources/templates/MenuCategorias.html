<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Categorías</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <h1 class="text-center mb-4">Seleccione una Categoría</h1>

        <!-- Mostrar error si lo hay -->
        <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}">
            Ocurrió un error.
        </div>

        <div class="row justify-content-center">
            <div th:each="cat : ${categorias}" class="col-md-4 mb-3">
                <a th:href="@{/categoria/{id}/productos(id=${cat.id})}" class="btn btn-outline-primary w-100 py-3 fs-5"
                    th:text="${cat.nombre + (cat.descripcion != null ? ' (' + cat.descripcion + ')' : '')}">
                    Categoría
                </a>
            </div>
        </div>
    </div>

</body>

</html>
