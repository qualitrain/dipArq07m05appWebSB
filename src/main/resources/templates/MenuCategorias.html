<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Categorías</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>Seleccione una Categoría</h1>
            <a th:href="@{/carrito}" class="btn btn-outline-primary">Ver Carrito</a>
        </div>

        <!-- Mostrar error si lo hay -->
        <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}">
            Ocurrió un error.
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
            <div th:each="cat : ${categorias}" class="col">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title" th:text="${cat.nombre}">Nombre Categoría</h5>
                        <p class="card-text text-muted" th:text="${cat.descripcion}">Descripción de la categoría.</p>
                        <a th:href="@{/categoria/{id}/productos(id=${cat.id})}" class="btn btn-primary">Ir</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
